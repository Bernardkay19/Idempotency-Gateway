name: Keep Render Awake

on:
  schedule:
    # Runs every 12 minutes, every day
    - cron: "*/12 * * * *"
  workflow_dispatch: # Allows you to run it manually from GitHub if wanted

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" https://idempotency-gateway-pv6p.onrender.com/actuator/health
